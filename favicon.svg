<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#020202"/>
  <rect x="2" y="2" width="60" height="60" rx="10" fill="none" stroke="#2563eb" stroke-width="2.5" opacity="0.5"/>
  <!-- Globe circle -->
  <circle cx="32" cy="28" r="16" fill="none" stroke="#2563eb" stroke-width="2.5"/>
